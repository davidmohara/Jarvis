<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a3a5c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#glow)"/>

  <!-- Subtle grid lines (HUD feel) -->
  <g opacity="0.06" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>

  <!-- === DAVID (left side) === -->
  <g transform="translate(200, 280)">
    <!-- Body - casual but sharp -->
    <rect x="-45" y="60" width="90" height="100" rx="10" fill="#2c3e50" stroke="#4fc3f7" stroke-width="0.5" opacity="0.8"/>
    <!-- Collar/shirt hint -->
    <path d="M-15,60 L0,80 L15,60" fill="none" stroke="#7f8c8d" stroke-width="2"/>

    <!-- Head -->
    <ellipse cx="0" cy="20" rx="42" ry="48" fill="#d4a574"/>
    <!-- Hair - short, neat -->
    <ellipse cx="0" cy="-15" rx="44" ry="28" fill="#4a3728"/>
    <ellipse cx="-20" cy="-5" rx="10" ry="15" fill="#4a3728"/>
    <ellipse cx="20" cy="-5" rx="10" ry="15" fill="#4a3728"/>

    <!-- Beard/stubble -->
    <ellipse cx="0" cy="45" rx="30" ry="15" fill="#3d2b1f" opacity="0.4"/>
    <ellipse cx="-18" cy="30" rx="8" ry="20" fill="#3d2b1f" opacity="0.3"/>
    <ellipse cx="18" cy="30" rx="8" ry="20" fill="#3d2b1f" opacity="0.3"/>

    <!-- Eyes - confident, slightly narrowed -->
    <g transform="translate(-15, 15)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="white"/>
      <circle cx="2" cy="0" r="3.5" fill="#2c3e50"/>
      <circle cx="3" cy="-1" r="1" fill="white"/>
      <!-- Eyebrow - strong -->
      <line x1="-9" y1="-10" x2="9" y2="-12" stroke="#3d2b1f" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g transform="translate(15, 15)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="white"/>
      <circle cx="2" cy="0" r="3.5" fill="#2c3e50"/>
      <circle cx="3" cy="-1" r="1" fill="white"/>
      <line x1="-9" y1="-12" x2="9" y2="-10" stroke="#3d2b1f" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Smirk -->
    <path d="M-12,38 Q0,48 15,36" fill="none" stroke="#8b6f5e" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M0,20 L-3,32 Q0,35 3,32 Z" fill="#c49664" opacity="0.6"/>

    <!-- Arm pointing/gesturing at Jarvis -->
    <g transform="translate(45, 80)">
      <line x1="0" y1="0" x2="80" y2="-30" stroke="#d4a574" stroke-width="14" stroke-linecap="round"/>
      <line x1="80" y1="-30" x2="120" y2="-45" stroke="#d4a574" stroke-width="12" stroke-linecap="round"/>
      <!-- Pointing finger -->
      <line x1="120" y1="-45" x2="145" y2="-55" stroke="#d4a574" stroke-width="6" stroke-linecap="round"/>
    </g>

    <!-- Coffee cup in other hand -->
    <g transform="translate(-70, 100)">
      <rect x="-12" y="-20" width="24" height="28" rx="3" fill="#5d4037"/>
      <ellipse cx="0" cy="-20" rx="12" ry="4" fill="#6d4c41"/>
      <ellipse cx="0" cy="-20" rx="9" ry="3" fill="#3e2723"/>
      <!-- Steam -->
      <path d="M-4,-28 Q-6,-38 -2,-45" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
      <path d="M4,-28 Q6,-38 2,-48" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
      <!-- Handle -->
      <path d="M12,-15 Q22,-12 12,-2" fill="none" stroke="#5d4037" stroke-width="3"/>
    </g>
  </g>

  <!-- === JARVIS (right side) - floating holographic orb === -->
  <g transform="translate(570, 240)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.3" filter="url(#neon)"/>
    <circle cx="0" cy="0" r="95" fill="none" stroke="#4fc3f7" stroke-width="0.5" opacity="0.15"/>

    <!-- Core orb -->
    <circle cx="0" cy="0" r="60" fill="#0d2137" stroke="#4fc3f7" stroke-width="2" filter="url(#neon)"/>
    <circle cx="0" cy="0" r="45" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>

    <!-- Inner eye / AI core -->
    <ellipse cx="0" cy="0" rx="25" ry="12" fill="#4fc3f7" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#4fc3f7" opacity="0.25"/>
    <ellipse cx="0" cy="0" rx="8" ry="4" fill="#4fc3f7" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.8"/>

    <!-- Orbital rings -->
    <ellipse cx="0" cy="0" rx="75" ry="25" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.3" transform="rotate(-20)"/>
    <ellipse cx="0" cy="0" rx="75" ry="25" fill="none" stroke="#4fc3f7" stroke-width="0.8" opacity="0.2" transform="rotate(30)"/>

    <!-- Scanning lines -->
    <line x1="-70" y1="-50" x2="-50" y2="-50" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
    <line x1="-70" y1="-40" x2="-40" y2="-40" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
    <line x1="40" y1="40" x2="70" y2="40" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
    <line x1="50" y1="50" x2="70" y2="50" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- === SPEECH BUBBLES === -->

  <!-- David's rapid-fire commands -->
  <g filter="url(#softglow)">
    <!-- Bubble 1 -->
    <rect x="50" y="30" width="210" height="34" rx="17" fill="#1a3a5c" stroke="#4fc3f7" stroke-width="1.2"/>
    <text x="155" y="52" text-anchor="middle" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold">"Kill SXSW."</text>

    <!-- Bubble 2 -->
    <rect x="30" y="75" width="280" height="34" rx="17" fill="#1a3a5c" stroke="#4fc3f7" stroke-width="1.2"/>
    <text x="170" y="97" text-anchor="middle" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold">"You got the time wrong again."</text>

    <!-- Bubble 3 -->
    <rect x="70" y="120" width="190" height="34" rx="17" fill="#1a3a5c" stroke="#4fc3f7" stroke-width="1.2"/>
    <text x="165" y="142" text-anchor="middle" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold">"I'll handle."</text>

    <!-- Bubble 4 -->
    <rect x="15" y="165" width="320" height="34" rx="17" fill="#1a3a5c" stroke="#4fc3f7" stroke-width="1.2"/>
    <text x="175" y="187" text-anchor="middle" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold">"Make it so you don't miss that."</text>
  </g>

  <!-- Jarvis response bubble -->
  <g filter="url(#softglow)">
    <rect x="430" y="380" width="340" height="34" rx="17" fill="#0d2137" stroke="#4fc3f7" stroke-width="1" opacity="0.8"/>
    <text x="600" y="402" text-anchor="middle" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="12" opacity="0.9">"Done. System updated. Won't repeat."</text>

    <rect x="460" y="425" width="290" height="34" rx="17" fill="#0d2137" stroke="#4fc3f7" stroke-width="1" opacity="0.6"/>
    <text x="605" y="447" text-anchor="middle" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="11" opacity="0.7">"...also, you're not delegating enough."</text>
  </g>

  <!-- === FLOATING HUD ELEMENTS === -->

  <!-- OmniFocus inbox count -->
  <g transform="translate(680, 30)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#e74c3c" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">INBOX: 7</text>
  </g>

  <!-- Rocks status -->
  <g transform="translate(700, 70)" opacity="0.5">
    <text x="0" y="0" text-anchor="end" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="9">ROCK 1 ███████░░ 70%</text>
    <text x="0" y="16" text-anchor="end" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="9">ROCK 2 █████░░░░ 55%</text>
    <text x="0" y="32" text-anchor="end" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="9">ROCK 3 ██████░░░ 60%</text>
    <text x="0" y="48" text-anchor="end" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="9">ROCK 4 ████░░░░░ 45%</text>
  </g>

  <!-- Clock (the correction) -->
  <g transform="translate(70, 560)">
    <text x="0" y="0" fill="#e74c3c" font-family="SF Mono, Menlo, monospace" font-size="11" text-decoration="line-through" opacity="0.5">15:37 UTC</text>
    <text x="110" y="0" fill="#4fc3f7" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold">→ 9:37 AM CST ✓</text>
  </g>

  <!-- Title -->
  <text x="400" y="570" text-anchor="middle" fill="#4fc3f7" font-family="Georgia, serif" font-size="20" font-style="italic" opacity="0.6">"Close the execution gap."</text>
</svg>